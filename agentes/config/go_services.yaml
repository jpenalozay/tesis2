# Go Infrastructure Services Configuration

# NATS Configuration
nats:
  url: "nats://localhost:4222"
  cluster_urls:
    - "nats://localhost:4222"
    - "nats://localhost:4223"
    - "nats://localhost:4224"
  max_reconnect: 10

# Redis Configuration
redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  ttl: 86400  # 24 hours in seconds

# PostgreSQL Configuration
postgres:
  host: "localhost"
  port: 5432
  user: "postgres"
  password: "postgres"
  database: "framework"
  sslmode: "disable"

# Gitea Configuration (Git-based Document Store)
gitea:
  base_url: "http://localhost:3000"
  token: ""  # Generate from Gitea UI: Settings -> Applications -> Generate Token
  owner: "framework"  # Organization or user
  repo: "docs-architecture"  # Repository for documents
  webhook_url: "http://host.docker.internal:8080/api/webhooks/gitea"  # Webhook endpoint

# gRPC Configuration
grpc:
  port: 50051
