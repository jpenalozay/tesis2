# Redis Configuration File
# Optimizado para comunicación entre agentes

# Puerto
port 6379

# Bind a todas las interfaces
bind 0.0.0.0

# Persistencia
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
logfile ""

# Maxmemory y política de evicción
maxmemory 256mb
maxmemory-policy allkeys-lru

# Timeout de conexiones inactivas
timeout 300

# TCP keepalive
tcp-keepalive 300

# Base de datos
databases 16

# AOF (Append Only File) para persistencia
appendonly yes
appendfsync everysec

# Desactivar comandos peligrosos en producción
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# Optimizaciones de performance
hz 10

# Compression
list-compress-depth 0

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes

