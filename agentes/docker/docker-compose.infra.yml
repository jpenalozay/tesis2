version: '3.8'

services:
  # NATS JetStream
  nats:
    image: nats:latest
    container_name: framework-nats
    ports:
      - "4222:4222"  # Client port
      - "8222:8222"  # HTTP monitoring
      - "6222:6222"  # Cluster port
    command: ["-js", "-m", "8222"]
    volumes:
      - nats-data:/data
    networks:
      - framework-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: framework-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - framework-network

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: framework-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: framework
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - framework-network

  # Gitea (Git-based Document Store)
  gitea:
    image: gitea/gitea:latest
    container_name: framework-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=postgres:5432
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=postgres
      - GITEA__database__PASSWD=postgres
      - GITEA__server__DOMAIN=localhost
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__ROOT_URL=http://localhost:3000/
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__webhook__SKIP_TLS_VERIFY=true
    ports:
      - "3000:3000"  # Web UI
      - "2222:22"    # SSH
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - framework-network
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  nats-data:
  redis-data:
  postgres-data:
  gitea-data:

networks:
  framework-network:
    driver: bridge
